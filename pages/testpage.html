<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Тест запроса к серверу</title>
</head>
<body>
    <div><button onclick="testFunc()">Тест</button></div>
    <div><textarea id = "answerArea" rows = "18" cols="82"></textarea></div>

    <script>
        let timerEnabledFlag = false;

        const timerTick = () => {
            const req = new XMLHttpRequest();
            req.onload = () => {
                if (req.status == 200) {
                    const answerObject = req.response;
                    const answerTextArea = document.getElementById("answerArea");
                    answerTextArea.value = "";
                    for (let key in answerObject){
                            answerTextArea.value += key + ": " + answerObject[key] + "\n";
                        }
                    if (timerEnabledFlag){
                        setTimeout(() => {
                            timerTick(); 
                        }, 200);
                    }                                                            
                }
            };
            req.open("GET", 'http://localhost:8000/demoserver/exec?command=1&param=2');
            req.responseType = "json";
            req.send();
        }


        
        

        const testFunc = () => {
            if (timerEnabledFlag){
                timerEnabledFlag = false;
            }
            else {
                timerEnabledFlag = true;
                timerTick();
            }
            //timerTick();

        }
    </script>
</body>
</html>
